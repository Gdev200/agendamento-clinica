<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Agendamento - Clínica Médica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agendamento Online</h1>
        <p>Preencha os dados abaixo para marcar sua consulta.</p>

        <form id="agendamentoForm">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
            </div>

            <div class="form-group">
                <label for="data">Data da Consulta:</label>
                <input type="date" id="data" name="data" required>
            </div>

            <div class="form-group">
                <label for="horario">Horário Disponível:</label>
                <select id="horario" name="horario" required disabled>
                    <option value="">Selecione uma data primeiro</option>
                </select>
            </div>

            <button type="submit" id="btnConfirmar">Confirmar Agendamento</button>
        </form>

        <div id="resumo" class="hidden">
            <h2>Agendamento Confirmado!</h2>
            <div id="dadosResumo"></div>
            <button onclick="window.location.reload()">Novo Agendamento</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
